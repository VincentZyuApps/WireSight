# WireSight uses the common OptiFine shaderpack feature set for Iris, Oculus,
# and OptiFine compatibility.
oldLighting=false
oldHandLight=false
separateAo=true
underwaterOverlay=false
vignette=false
clouds=off
sun=false
moon=false
stars=false

# Translucent world geometry is intentionally presented as solid modeling
# geometry. This avoids blending overdraw and keeps the visual language clear.
blend.gbuffers_water=off

screen=WIREFRAME_SHADING EDGE_WIDTH GRID_FADE_START GRID_FADE_END
screen.columns=2
sliders=EDGE_WIDTH GRID_FADE_START GRID_FADE_END
