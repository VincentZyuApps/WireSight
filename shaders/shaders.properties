# WireSight 着色器包设置 🛠️
# 仅使用常见的 OptiFine ShaderPack 属性，以兼容 Iris、Oculus 和 OptiFine。

# 关闭旧版手持光源与旧版光照混合，避免原版色调覆盖 WireSight 的纯色方案。
oldLighting=false
oldHandLight=false

# 将环境光遮蔽信息分开提供给着色器。当前极简程序不依赖旧式 AO 混色。
separateAo=true

# 关闭水下覆盖层、暗角和原版天空装饰，让输出保持干净、统一。
underwaterOverlay=false
vignette=false
clouds=off
sun=false
moon=false
stars=false

# 🌊 半透明世界几何被有意画成不透明的建模表面。
# 关闭水通道混合可以减少层层透明表面造成的 overdraw，并保持可靠的深度遮挡。
blend.gbuffers_water=off

# 🎛️ 设置页布局：第一行列出用户可调选项，并将滑杆型数值登记给加载器。
screen=WIREFRAME_SHADING EDGE_WIDTH GRID_FADE_START GRID_FADE_END
screen.columns=2
sliders=EDGE_WIDTH GRID_FADE_START GRID_FADE_END
