# WireSight 着色器包设置 🛠️
# 仅使用常见的 OptiFine ShaderPack 属性，以兼容 Iris、Oculus 和 OptiFine。

# 关闭旧版手持光源与旧版光照混合，避免原版色调覆盖 WireSight 的纯色方案。
oldLighting=false
oldHandLight=false

# 将环境光遮蔽信息分开提供给着色器。当前极简程序不依赖旧式 AO 混色。
separateAo=true

# 关闭水下覆盖层、暗角和原版天空装饰，让输出保持干净、统一。
underwaterOverlay=false
vignette=false
clouds=off
sun=false
moon=false
stars=false

# 🌊 半透明世界几何被有意画成不透明的建模表面。
# 关闭水通道混合可以减少层层透明表面造成的 overdraw，并保持可靠的深度遮挡。
blend.gbuffers_water=off

# 🎛️ 主设置页使用两列；自定义颜色页使用三列，使每组 R、G、B 保持在同一行。
screen=THEME_PRESET [CUSTOM_COLORS] WIREFRAME_SHADING EDGE_WIDTH EDGE_FADE_START EDGE_FADE_LENGTH
screen.columns=2
screen.CUSTOM_COLORS=THEME_PRESET <empty> <empty> CUSTOM_FACE_R CUSTOM_FACE_G CUSTOM_FACE_B CUSTOM_WATER_R CUSTOM_WATER_G CUSTOM_WATER_B CUSTOM_EDGE_R CUSTOM_EDGE_G CUSTOM_EDGE_B CUSTOM_ENTITY_R CUSTOM_ENTITY_G CUSTOM_ENTITY_B CUSTOM_SKY_R CUSTOM_SKY_G CUSTOM_SKY_B
screen.CUSTOM_COLORS.columns=3

# 数值选项使用加载器提供的滑杆；主题预设与方向色阶保留离散选择控件。
sliders=EDGE_WIDTH EDGE_FADE_START EDGE_FADE_LENGTH CUSTOM_FACE_R CUSTOM_FACE_G CUSTOM_FACE_B CUSTOM_WATER_R CUSTOM_WATER_G CUSTOM_WATER_B CUSTOM_EDGE_R CUSTOM_EDGE_G CUSTOM_EDGE_B CUSTOM_ENTITY_R CUSTOM_ENTITY_G CUSTOM_ENTITY_B CUSTOM_SKY_R CUSTOM_SKY_G CUSTOM_SKY_B
